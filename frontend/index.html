<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var p = localStorage.getItem('ef-theme');
          var resolved =
            p === 'light' || p === 'dark'
              ? p
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Eagle-Foundry connects students and companies to build, fund, and launch ambitious projects." />
    <title>Eagle-Foundry</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
